<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel de Control - Gestión de Ascensores</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f8fafc; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid #e2e8f0; }
        .tab-btn { padding: 10px 20px; cursor: pointer; background: #e2e8f0; border: none; border-radius: 5px 5px 0 0; font-weight: bold; }
        .tab-btn.active { background: #2b5c8f; color: white; }
        .content { display: none; }
        .content.active { display: block; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #cbd5e1; border-radius: 5px; box-sizing: border-box; }
        button.save { width: 100%; padding: 12px; background: #009e73; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; border: 1px solid #e2e8f0; text-align: left; }
    </style>
</head>
<body>

<div class="container">
    <h1>⚙️ Panel de Control - Gestión de Ascensores</h1>
    
    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('ingreso', this)">📝 Ingreso de Casos</button>
        <button class="tab-btn" onclick="showTab('monitoreo', this)">📊 Monitoreo</button>
        <button class="tab-btn" onclick="showTab('graficos', this)">📈 Gráficos</button>
    </div>

    <div id="ingreso" class="content active">
        <h3>Registrar Caso de Ascensor</h3>
        <input type="text" id="edificio" placeholder="Código Edificio (Ej: M1408)">
        <input type="text" id="tecnico" placeholder="Nombre/Iniciales Técnico">
        <select id="tipoCaso">
            <option value="Emergencia">Equipo Detenido (Emergencia)</option>
            <option value="Mantencion">Mantención Programada</option>
        </select>
        <button class="save" onclick="guardarCaso()">Registrar Caso</button>
    </div>

    <div id="monitoreo" class="content">
        <h3>📋 Casos Activos</h3>
        <table>
            <thead><tr><th>Edificio</th><th>Técnico</th><th>Tipo</th></tr></thead>
            <tbody id="tabla-casos"></tbody>
        </table>
    </div>

    <div id="graficos" class="content">
        <h3>📈 Resumen de Carga de Técnicos</h3>
        <canvas id="graficoCarga" width="400" height="150"></canvas>
    </div>
</div>

<script>
    function showTab(id, btn) {
        document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
    }

    function guardarCaso() {
        const nuevoCaso = {
            edificio: document.getElementById('edificio').value,
            tecnico: document.getElementById('tecnico').value,
            tipo: document.getElementById('tipoCaso').value
        };
        
        let casos = JSON.parse(localStorage.getItem('casos')) || [];
        casos.push(nuevoCaso);
        localStorage.setItem('casos', JSON.stringify(casos));
        
        // Limpiar campos
        document.getElementById('edificio').value = "";
        document.getElementById('tecnico').value = "";
        
        alert("Caso registrado correctamente");
        cargarDatos();
    }

    function cargarDatos() {
        const tabla = document.getElementById('tabla-casos');
        tabla.innerHTML = "";
        const casos = JSON.parse(localStorage.getItem('casos')) || [];
        casos.forEach(c => {
            tabla.innerHTML += `<tr><td>${c.edificio}</td><td>${c.tecnico}</td><td>${c.tipo}</td></tr>`;
        });
    }
    
    document.addEventListener('DOMContentLoaded', cargarDatos);
</script>
</body>
</html>
