<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Centro de Mando - Gestión de Ascensores</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f8fafc; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid #e2e8f0; }
        .tab-btn { padding: 10px 20px; cursor: pointer; background: #e2e8f0; border: none; border-radius: 5px 5px 0 0; font-weight: bold; }
        .tab-btn.active { background: #2b5c8f; color: white; }
        .content { display: none; }
        .content.active { display: block; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #cbd5e1; border-radius: 5px; box-sizing: border-box; }
        button.save { width: 100%; padding: 12px; background: #009e73; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        ul { list-style: none; padding: 0; }
        li { background: #f1f5f9; padding: 10px; margin-bottom: 5px; border-left: 5px solid #2b5c8f; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

<div class="container">
    <h1>⚙️ Centro de Mando - Gestión de Ascensores</h1>
    
    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('monitoreo', this)">📊 Monitoreo</button>
        <button class="tab-btn" onclick="showTab('ingreso', this)">📝 Ingreso</button>
        <button class="tab-btn" onclick="showTab('graficos', this)">📈 Gráficos</button>
    </div>

    <div id="monitoreo" class="content active">
        <h3>📋 Casos Activos</h3>
        <ul id="lista-casos"></ul>
    </div>

    <div id="ingreso" class="content">
        <h3>📝 Registrar Nuevo Caso</h3>
        <input type="text" id="edificio" placeholder="Nombre del edificio">
        <button class="save" onclick="guardar()">Registrar Caso</button>
    </div>

    <div id="graficos" class="content">
        <h3>📈 Estadísticas</h3>
        <canvas id="miGrafico" width="400" height="200"></canvas>
    </div>
</div>

<script>
    // Cambiar entre pestañas
    function showTab(id, btn) {
        document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
    }

    // Guardar en memoria del navegador
    function guardar() {
        const nombre = document.getElementById('edificio').value;
        if(!nombre) return;
        let casos = JSON.parse(localStorage.getItem('casos')) || [];
        casos.push(nombre);
        localStorage.setItem('casos', JSON.stringify(casos));
        document.getElementById('edificio').value = "";
        cargarLista();
    }

    function cargarLista() {
        const lista = document.getElementById('lista-casos');
        lista.innerHTML = "";
        const casos = JSON.parse(localStorage.getItem('casos')) || [];
        casos.forEach(c => lista.innerHTML += `<li>${c}</li>`);
    }
    
    document.addEventListener('DOMContentLoaded', cargarLista);
</script>
</body>
</html>
