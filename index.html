<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control - Gestión de Ascensores</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f8fafc; color: #1e293b; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { color: #0f172a; }
        .contenedor-pestanas { display: flex; gap: 10px; margin-bottom: 25px; border-bottom: 3px solid #1e293b; padding-bottom: 10px; }
        .btn-pestana { padding: 12px 24px; font-weight: bold; cursor: pointer; background-color: #e2e8f0; border: none; border-radius: 6px 6px 0 0; }
        .btn-pestana.activa { background-color: #1e293b; color: white; }
        .contenido-pestana { display: none; }
        .contenido-pestana.activa { display: block; }
        .form-card { background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        input, select, textarea { width: 100%; padding: 10px; margin-top: 5px; border: 2px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; color: white; background-color: #2b5c8f; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; border-bottom: 1px solid #ddd; text-align: left; }
    </style>
</head>
<body>

<div class="container">
    <h1>⚙️ Centro de Mando - Gestión de Ascensores</h1>

    <div class="contenedor-pestanas">
        <button class="btn-pestana activa" onclick="cambiarPestana('ingreso', this)">📝 Ingreso y Asignación</button>
        <button class="btn-pestana" onclick="cambiarPestana('monitoreo', this)">📊 Monitoreo</button>
        <button class="btn-pestana" onclick="cambiarPestana('graficos', this)">📈 Gráficos</button>
    </div>

    <div id="pestana-ingreso" class="contenido-pestana activa">
        <div class="form-card">
            <h3>Registrar Caso</h3>
            <label>Código Edificio:</label>
            <input type="text" id="eq-codigo">
            <label>Nombre Edificio (Escribe aquí):</label>
            <input type="text" id="eq-nombre">
            <label>Tipo de Caso:</label>
            <select id="eq-tipo">
                <option value="⚠️ Equipo Detenido">⚠️ Equipo Detenido</option>
                <option value="🔧 Falla Compleja">🔧 Falla Compleja</option>
                <option value="📅 Mantención">📅 Mantención</option>
            </select>
            <button class="btn" onclick="registrarCaso()">Registrar</button>
        </div>
    </div>

    <div id="pestana-monitoreo" class="contenido-pestana">
        <div class="form-card">
            <h3>Casos Activos</h3>
            <table id="tabla-casos">
                <thead><tr><th>Código</th><th>Edificio</th><th>Tipo</th></tr></thead>
                <tbody id="lista-casos"></tbody>
            </table>
        </div>
    </div>

    <div id="pestana-graficos" class="contenido-pestana">
        <div class="form-card">
            <canvas id="graficoMes" height="100"></canvas>
        </div>
    </div>
</div>

<script>
    let casos = JSON.parse(localStorage.getItem('casos')) || [];

    function cambiarPestana(id, btn) {
        document.querySelectorAll('.contenido-pestana').forEach(el => el.classList.remove('activa'));
        document.querySelectorAll('.btn-pestana').forEach(el => el.classList.remove('activa'));
        document.getElementById('pestana-' + id).classList.add('activa');
        btn.classList.add('activa');
    }

    function registrarCaso() {
        const nuevo = {
            codigo: document.getElementById('eq-codigo').value,
            nombre: document.getElementById('eq-nombre').value,
            tipo: document.getElementById('eq-tipo').value
        };
        casos.push(nuevo);
        localStorage.setItem('casos', JSON.stringify(casos));
        renderizar();
        alert("Registrado");
    }

    function renderizar() {
        const lista = document.getElementById('lista-casos');
        lista.innerHTML = casos.map(c => `<tr><td>${c.codigo}</td><td>${c.nombre}</td><td>${c.tipo}</td></tr>`).join('');
    }

    renderizar();
</script>
</body>
</html>
