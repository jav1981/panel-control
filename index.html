<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel de Control - Ascensores</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .solo-admin { display: none; }
        .visible { display: block !important; }
        .boton-clave { background: #333; color: white; padding: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Centro de Mando</h1>
    <button class="boton-clave" onclick="acceder()">🔑 Acceso Supervisor</button>
    
    <div id="area-admin" class="solo-admin">
        <h3>📝 Registrar nuevo caso</h3>
        <input type="text" id="input-caso" placeholder="Nombre Edificio">
        <button onclick="guardar()">Guardar Caso</button>
    </div>

    <script>
        function acceder() {
            const clave = prompt("Introduce tu clave:");
            if (clave === "motita1236") {
                document.getElementById('area-admin').classList.add('visible');
                alert("¡Bienvenido Supervisor!");
            } else {
                alert("Clave incorrecta");
            }
        }
    </script>
</body>
</html>
