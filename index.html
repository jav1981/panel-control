<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel de Control</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f9; }
        .contenedor { background: white; padding: 20px; border-radius: 8px; max-width: 500px; margin: auto; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #2b5c8f; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>

    <div class="contenedor">
        <h1>Centro de Mando</h1>
        
        <h3>📝 Registrar Edificio</h3>
        <input type="text" id="nombreEdificio" placeholder="Nombre del edificio">
        <button onclick="guardarDato()">Guardar Caso</button>

        <h3>📋 Casos Guardados</h3>
        <ul id="listaCasos"></ul>
    </div>

    <script>
        // Esta función guarda el nombre en el navegador
        function guardarDato() {
            let input = document.getElementById("nombreEdificio");
            let lista = document.getElementById("listaCasos");
            
            if (input.value.trim() !== "") {
                let li = document.createElement("li");
                li.textContent = input.value;
                lista.appendChild(li);
                input.value = ""; // Limpia el campo
            }
        }
    </script>
</body>
</html>
