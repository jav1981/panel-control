<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Control de Ascensores</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f9; }
        .admin-area { display: none; background: white; padding: 15px; border-radius: 8px; margin-top: 10px; }
        .visible { display: block; }
        ul { list-style: none; padding: 0; }
        li { background: white; padding: 10px; margin-bottom: 5px; border-left: 5px solid #2b5c8f; display: flex; justify-content: space-between; }
    </style>
</head>
<body>
    <h1>Control de Ascensores</h1>
    <button onclick="acceder()">🔑 Acceso Supervisor</button>

    <div id="admin-area" class="admin-area">
        <h3>📝 Registrar Edificio</h3>
        <input type="text" id="edificio" placeholder="Nombre Edificio">
        <button onclick="guardar()">Guardar</button>
    </div>

    <h3>📋 Casos Activos</h3>
    <ul id="lista-casos"></ul>

    <script>
        // Cargar datos al abrir
        document.addEventListener('DOMContentLoaded', cargarDatos);

        function acceder() {
            const clave = prompt("Introduce tu clave:");
            if (clave === "motita1236") {
                document.getElementById('admin-area').classList.add('visible');
            } else { alert("Clave incorrecta"); }
        }

        function guardar() {
            const nombre = document.getElementById('edificio').value;
            if(!nombre) return;
            
            let casos = JSON.parse(localStorage.getItem('casos')) || [];
            casos.push(nombre);
            localStorage.setItem('casos', JSON.stringify(casos));
            document.getElementById('edificio').value = "";
            cargarDatos();
        }

        function cargarDatos() {
            const lista = document.getElementById('lista-casos');
            lista.innerHTML = "";
            const casos = JSON.parse(localStorage.getItem('casos')) || [];
            casos.forEach((c, index) => {
                lista.innerHTML += `<li>${c} <button onclick="borrar(${index})">❌</button></li>`;
            });
        }

        function borrar(index) {
            let casos = JSON.parse(localStorage.getItem('casos'));
            casos.splice(index, 1);
            localStorage.setItem('casos', JSON.stringify(casos));
            cargarDatos();
        }
    </script>
</body>
</html>
